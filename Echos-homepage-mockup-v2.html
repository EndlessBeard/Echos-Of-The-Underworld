<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Echoes from the Underworld — Homepage Mockup v2</title>
  <style>
    :root {
      --text: #f2f2f2;
      --ink: #000000;
      --page-bg: #141111;
      --header-bg: #b4b4b4;
      --hero-bg: #000000;
      --podcast-bg: #d86759;
      --services-bg: #b4473a;
      --resources-bg: #953d33;
      --store-bg: #592929;
      --about-bg: #471e1e;
      --connect-bg: #301818;
      --border: rgba(255, 255, 255, 0.16);
      --outline: rgba(0, 0, 0, 0.18);
      --max-width: 1180px;
      --radius: 18px;
      --section-min-height: 225px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--page-bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.45;
    }

    a {
      color: inherit;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .page {
      width: 100%;
      max-width: none;
      margin: 0;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--header-bg);
      color: var(--ink);
      border-bottom: 1px solid rgba(0, 0, 0, 0.16);
    }

    .toolbar {
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 8px 18px 8px 18px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      white-space: nowrap;
      flex: 1;
      text-align: left;
    }

    .menu-button,
    .section-button,
    .hero-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .menu-button {
      margin-left: auto;
      gap: 0;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 4px;
      border: 1px solid rgba(0, 0, 0, 0.22);
      background: rgba(255, 255, 255, 0.35);
      font-weight: 700;
    }

    .menu-icon {
      display: inline-flex;
      flex-direction: column;
      gap: 3px;
    }

    .menu-icon span {
      width: 14px;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
    }

    main {
      padding: 0 0 28px;
    }

    .hero,
    .section-band {
      border-radius: 0;
      overflow: hidden;
      border: none;
      margin-top: 0;
    }

    .hero {
      background: var(--hero-bg);
      display: grid;
      grid-template-columns: 1fr;
      position: relative;
    }

    .hero-copy,
    .hero-media,
    .section-copy,
    .section-caret,
    .section-action {
      padding: 0;
    }

    .hero-copy {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 22px;
      min-width: 0;
    }

    .hero-kicker,
    .section-kicker {
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.24em;
      font-size: 0.74rem;
      opacity: 0.72;
    }

    .hero-copy h1 {
      margin: 0;
      max-width: 11ch;
      font-size: clamp(2.9rem, 5vw, 5.3rem);
      line-height: 0.92;
      letter-spacing: -0.05em;
    }

    .hero-copy p {
      margin: 0;
      max-width: 58ch;
      color: rgba(242, 242, 242, 0.78);
      font-size: 1rem;
    }

    .hero-footer {
      display: flex;
      justify-content: flex-end;
      align-items: flex-end;
      min-height: 90px;
    }

    .hero-button {
      min-height: 52px;
      padding: 0 18px;
      border-radius: 999px;
      background: #f2f2f2;
      color: #111;
      font-weight: 700;
      border: 1px solid rgba(255, 255, 255, 0.18);
      gap: 10px;
    }

    .hero-button svg,
    .section-button svg,
    .caret svg,
    .section-caret svg {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
    }

    .hero-media {
      display: flex;
      align-items: center;
      justify-content: center;
      border-left: none;
      min-height: 0;
      padding: 0;
    }

    .hero-logo-placeholder {
      width: 100%;
      aspect-ratio: 1 / 1;
      max-width: 320px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(0, 0, 0, 0.16));
      text-align: center;
      font-size: 1.2rem;
      letter-spacing: 0.04em;
    }

    .hero-media img {
      width: 100%;
      max-width: none;
      height: auto;
      border-radius: 0;
      display: block;
    }

    .section-stack {
      display: grid;
      gap: 0;
      margin-top: 0;
    }

    .section-band {
      min-height: var(--section-min-height);
      height: var(--section-min-height);
      display: flex;
      align-items: stretch;
      position: relative;
    }

    .section-main {
      flex: 1 1 auto;
      display: flex;
      align-items: stretch;
      min-width: 0;
      height: 100%;
      position: relative;
    }

    .section-copy {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
      min-width: 0;
      height: 100%;
    }

    .section-copy-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      align-items: stretch;
      gap: 16px;
      min-width: 0;
      width: 100%;
      height: 100%;
      padding-right: clamp(146px, 17vw, 171px);
    }

    .button-cell {
      display: flex;
      position: absolute;
      top: 8px;
      bottom: 8px;
      right: 16px;
      align-self: stretch;
      align-items: stretch;
      padding: 0;
    }

    .section-copy h2 {
      margin: 0;
      font-size: clamp(2rem, 3vw, 2.9rem);
      line-height: 0.96;
      letter-spacing: -0.04em;
      max-width: none;
      white-space: normal;
      word-break: break-word;
    }

    .section-copy p {
      margin: 0;
      max-width: 60ch;
      color: rgba(242, 242, 242, 0.82);
    }

    .section-caret {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      flex: 0 0 auto;
      width: 54px;
    }

    .section-action {
      display: none;
      align-items: center;
      justify-content: flex-end;
      flex: 0 0 112px;
      padding-left: 0;
    }

    .section-button {
      width: auto;
      height: 100%;
      aspect-ratio: 2 / 3;
      border-radius: 4px;
      border: 4px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
      padding: 0;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      position: relative;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .section-copy-row .section-button {
      margin-left: auto;
      justify-self: end;
      align-self: stretch;
    }

    .section-button .button-placeholder {
      width: 100%;
      height: 100%;
      aspect-ratio: 2 / 3;
      border: 4px solid currentColor;
      background: rgba(255, 255, 255, 0.12);
      display: block;
    }

    .section-button > img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .section-button:hover,
    .hero-button:hover,
    .menu-button:hover {
      filter: brightness(1.05);
    }

    .section-button svg {
      width: 22px;
      height: 22px;
    }

    .hero-band {
      background: var(--hero-bg);
      height: auto;
      min-height: 0;
    }

    .podcast {
      --section-bg: var(--podcast-bg);
      --section-fill: var(--services-bg);
      background: var(--section-bg);
    }

    .services {
      --section-bg: var(--services-bg);
      --section-fill: var(--resources-bg);
      background: var(--section-bg);
    }

    .resources {
      --section-bg: var(--resources-bg);
      --section-fill: var(--store-bg);
      background: var(--section-bg);
    }

    .store {
      --section-bg: var(--store-bg);
      --section-fill: var(--about-bg);
      background: var(--section-bg);
    }

    .about {
      --section-bg: var(--about-bg);
      --section-fill: var(--connect-bg);
      background: var(--section-bg);
    }

    .connect {
      --section-bg: var(--connect-bg);
      --section-fill: var(--page-bg);
      background: var(--section-bg);
    }

    .section-chiron {
      position: absolute;
      left: 0;
      bottom: 0;
      width: clamp(180px, 20vw, 260px);
      height: clamp(54px, 6vw, 72px);
      display: block;
      color: var(--section-fill);
      fill: currentColor;
      pointer-events: none;
      z-index: 1;
    }

    #chiron-icon path {
      fill: currentColor;
    }

    .hero-band .section-main,
    .hero-band .section-caret,
    .hero-band .section-action {
      display: none;
    }

    .hero-band {
      display: block;
    }

    .hero-band .hero-button {
      position: absolute;
      right: 24px;
      bottom: 24px;
    }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .hero-media {
        border-left: none;
        border-top: 1px solid rgba(255, 255, 255, 0.14);
      }

      .section-band {
        flex-direction: column;
      }

      .section-main {
        min-height: 0;
      }

      .section-copy-row {
        padding-right: clamp(132px, 28vw, 171px);
      }

      .section-caret {
        min-height: 56px;
        width: 100%;
      }

      .section-action {
        justify-content: flex-start;
        padding-top: 0;
        flex-basis: auto;
      }

      .section-button {
        margin-left: 24px;
        margin-bottom: 24px;
      }
    }

    @media (max-width: 640px) {
      .page {
        width: 100%;
        max-width: none;
        margin: 0;
      }

      .toolbar {
        flex-wrap: wrap;
        justify-content: center;
      }

      .hero-copy,
      .section-copy,
      .section-caret,
      .section-action {
        padding: 18px;
      }

      .section-copy-row {
        padding-right: 132px;
      }

      .hero-media {
        padding: 0;
      }

      .hero-band .hero-button {
        right: 18px;
        bottom: 18px;
      }

      .section-button {
        margin-left: 18px;
        margin-bottom: 18px;
      }

      .hero-copy h1,
      .section-copy h2 {
        max-width: none;
      }
    }
  </style>
</head>
